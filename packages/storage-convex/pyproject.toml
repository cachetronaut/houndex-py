[project]
name = "houndex-storage-convex"
version = "0.1.0"
description = "Convex client adapter implementing the framework StorageAdapter contract, backed by a deployed houndex/storage-convex Convex backend."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "houndex-core",
]

# The Convex Python client is only needed to talk to a real deployment; the
# adapter itself is generic over a small client protocol, so tests run without
# it. Install `houndex-storage-convex[client]` to get the real client.
[project.optional-dependencies]
client = ["convex>=0.6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_storage_convex"]
