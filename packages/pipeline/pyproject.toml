[project]
name = "houndex-pipeline"
version = "0.1.0"
description = "Deterministic ingestion and enrichment transforms for the framework: chunking, content-hash dedupe, source tiering, claim assembly, and enrichment."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "houndex-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_pipeline"]
