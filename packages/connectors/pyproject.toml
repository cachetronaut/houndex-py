[project]
name = "houndex-connectors"
version = "0.1.0"
description = "Deterministic source connectors that feed Houndex ingestion with scraped pages."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "houndex-core",
    "houndex-pipeline",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_connectors"]
