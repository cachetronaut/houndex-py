[project]
name = "houndex-core"
version = "0.1.0"
description = "Core contracts for a storage-decoupled, last-mile RAG framework: schemas, output envelopes, tenant context, provider ports, and the storage adapter interface."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_core"]
