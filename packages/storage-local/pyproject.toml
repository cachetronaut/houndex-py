[project]
name = "houndex-storage-local"
version = "0.1.0"
description = "Zero-service, in-memory reference implementation of the framework StorageAdapter contract."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "houndex-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_storage_local"]
