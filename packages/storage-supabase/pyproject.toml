[project]
name = "houndex-storage-supabase"
version = "0.1.0"
description = "Supabase (Postgres + pgvector) client adapter implementing the framework StorageAdapter contract."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "houndex-core",
]

# The Supabase Python client is only needed to talk to a real database; the
# adapter is generic over a small client protocol, so tests run without it.
[project.optional-dependencies]
client = ["supabase>=2.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_storage_supabase"]
