[project]
name = "houndex-evals"
version = "0.1.0"
description = "Deterministic regression/evaluation harness: fixture schema, generic output-envelope rubric scoring, canonical-JSON hashing, and report generation."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "houndex-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_evals"]
