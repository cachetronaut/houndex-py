[project]
name = "houndex-surface-api"
version = "0.1.0"
description = "FastAPI service exposing Houndex verify, ask, and ingest over HTTP."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.115",
    "httpx>=0.28",
    "houndex-cli",
    "houndex-connectors",
    "houndex-core",
    "houndex-pipeline",
    "houndex-storage-local",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_surface_api"]
