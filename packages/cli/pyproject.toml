[project]
name = "houndex-cli"
version = "0.1.0"
description = "Operator + CI surface for the framework verification engine: init, doctor, ingest, ask, verify, eval over a configured storage adapter. The per-transaction verifier is the houndex-evals library."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "houndex-core",
    "houndex-evals",
    "houndex-storage-local",
    "typer>=0.12",
]

# Remote adapters are optional — installed only when you target them.
[project.optional-dependencies]
supabase = ["houndex-storage-supabase[client]"]
convex = ["houndex-storage-convex[client]"]

[project.scripts]
houndex = "houndex_cli.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/houndex_cli"]
